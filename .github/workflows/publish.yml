name: Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    outputs:
      manifest_url: ${{ steps.release_meta.outputs.manifest_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "${release_tag}" ]; then
            echo "release_tag could not be resolved" >&2
            exit 1
          fi

          artifact_base_url="https://github.com/${{ github.repository }}/releases/download/${release_tag}"
          manifest_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "artifact_base_url=${artifact_base_url}" >> "${GITHUB_OUTPUT}"
          echo "manifest_url=${manifest_url}" >> "${GITHUB_OUTPUT}"

      - name: Build artifacts and manifest
        shell: bash
        run: |
          python scripts/build_repo.py \
            --config publisher.config.json \
            --output-dir dist \
            --artifact-base-url "${{ steps.release_meta.outputs.artifact_base_url }}"

      - name: Validate generated manifest
        shell: bash
        run: |
          python scripts/validate_manifest.py \
            --manifest dist/manifest.json \
            --artifacts-dir dist/artifacts

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          files: dist/artifacts/*
          make_latest: true
          overwrite_files: true

      - name: Verify artifact URLs
        shell: bash
        run: |
          python - <<'PY' > artifact_urls.txt
          import json
          from pathlib import Path

          manifest = json.loads(Path("dist/manifest.json").read_text(encoding="utf-8"))
          for package in manifest["packages"]:
              print(package["artifact_url"])
          PY

          while IFS= read -r artifact_url; do
            echo "Checking ${artifact_url}"
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent --show-error --location "${artifact_url}" --output /dev/null; then
                break
              fi

              if [ "${attempt}" -eq 5 ]; then
                echo "Artifact URL did not become available: ${artifact_url}" >&2
                exit 1
              fi

              sleep 5
            done
          done < artifact_urls.txt

      - name: Prepare GitHub Pages payload
        shell: bash
        run: |
          mkdir -p pages-site
          cp dist/manifest.json pages-site/manifest.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write manifest URL to job summary
        shell: bash
        run: |
          echo "manifest_url: ${{ needs.build-and-release.outputs.manifest_url }}" >> "${GITHUB_STEP_SUMMARY}"

# Registration nudge: force GitHub to (re-)index this workflow after Actions was enabled.
